<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Système de Gestion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0B1120;
            --bg-card: #151E32;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --accent-purple: #8B5CF6;
            --danger: #EF4444;
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 1rem;
            transition: 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .demo-accounts {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .demo-accounts h3 {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .demo-account {
            background: var(--bg-body);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;            align-items: center;
            gap: 10px;
        }

        .demo-account:hover {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-blue);
        }

        .demo-account .role-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .role-admin { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .role-vendeur { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .role-caissier { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 4px solid var(--danger);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-left-color: var(--accent-green);
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
    </style>
</head><body>

    <div class="toast" id="toast"></div>

    <div class="login-container">
        <div class="login-header">
            <h1><i class="fa-solid fa-store"></i> POS System</h1>
            <p>Connexion à votre espace</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-sign-in-alt"></i> Se connecter
            </button>
        </form>

        <div class="demo-accounts">
            <h3>Comptes de démonstration</h3>
            <div class="demo-account" onclick="fillLogin('admin', 'admin123', 'Admin')">
                <span class="role-badge role-admin">Admin</span>
                <span>admin / admin123</span>
            </div>
            <div class="demo-account" onclick="fillLogin('vendeur', 'vendeur123', 'Vendeur')">
                <span class="role-badge role-vendeur">Vendeur</span>
                <span>vendeur / vendeur123</span>
            </div>
            <div class="demo-account" onclick="fillLogin('caissier', 'caissier123', 'Caissier')">
                <span class="role-badge role-caissier">Caissier</span>
                <span>caissier / caissier123</span>
            </div>
        </div>
    </div>

    <script>        // Initialize default users if not exists
        function initializeUsers() {
            const users = localStorage.getItem('users');
            if (!users) {
                const defaultUsers = [
                    { id: 1, username: 'admin', password: 'admin123', role: 'admin', name: 'Administrateur' },
                    { id: 2, username: 'vendeur', password: 'vendeur123', role: 'vendeur', name: 'Jean Vendeur' },
                    { id: 3, username: 'caissier', password: 'caissier123', role: 'caissier', name: 'Marie Caissier' }
                ];
                localStorage.setItem('users', JSON.stringify(defaultUsers));
            }
        }

        initializeUsers();

        function fillLogin(username, password, roleName) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            showToast(`Connecté en tant que ${roleName}`, 'success');
            setTimeout(() => handleLogin(null), 500);
        }

        function handleLogin(e) {
            if (e) e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                // Save current user session
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                showToast('Connexion réussie!', 'success');
                
                // Redirect based on role
                setTimeout(() => {
                    switch(user.role) {
                        case 'admin':
                            window.location.href = 'admin.html';
                            break;
                        case 'vendeur':
                            window.location.href = 'vendeur.html';
                            break;
                        case 'caissier':
                            window.location.href = 'caissier.html';
                            break;
                        default:                            window.location.href = 'dashboard.html';
                    }
                }, 500);
            } else {
                showToast('Identifiants incorrects', 'error');
            }
        }

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Check if already logged in
        window.onload = function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (currentUser) {
                switch(currentUser.role) {
                    case 'admin': window.location.href = 'admin.html'; break;
                    case 'vendeur': window.location.href = 'vendeur.html'; break;
                    case 'caissier': window.location.href = 'caissier.html'; break;
                }
            }
        }
    </script>
</body>
</html>
