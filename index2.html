<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double King Shop - Boutique en Ligne</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; }
        .nav { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 5px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .cart-btn { background: #ffd700; color: #333; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 4rem 1rem; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .section-title { text-align: center; font-size: 2rem; margin: 2rem 0; color: #333; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .product-image { width: 100%; height: 250px; object-fit: cover; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999; font-size: 4rem; }
        .product-info { padding: 1.5rem; }
        .product-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; color: #333; }
        .product-price { font-size: 1.5rem; color: #667eea; font-weight: bold; margin-bottom: 1rem; }
        .add-to-cart { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 1rem; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: opacity 0.3s; }
        .add-to-cart:hover { opacity: 0.9; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 10px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.5rem; color: #333; }
        .close-btn { font-size: 2rem; cursor: pointer; color: #999; }
        .close-btn:hover { color: #333; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #eee; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: bold; margin-bottom: 0.25rem; }
        .cart-item-price { color: #667eea; }
        .cart-item-quantity { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn { background: #667eea; color: white; border: none; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 0.5rem; border-radius: 5px; cursor: pointer; }
        .cart-total { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid #667eea; font-size: 1.5rem; font-weight: bold; text-align: right; color: #333; }
        .checkout-form { margin-top: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .checkout-btn { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 1rem; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 1rem; }        .pi-payment-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); margin-top: 0.5rem; }
        .notification { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white; padding: 1rem 2rem; border-radius: 5px; display: none; z-index: 2000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .hero h1 { font-size: 1.8rem; } .products { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">👑 Double King</div>
            <nav class="nav">
                <a href="#accueil">Accueil</a>
                <a href="#produits">Produits</a>
                <a href="admin.html">Espace Staff</a>
                <div class="cart-btn" onclick="toggleCart()">🛒 Panier <span id="cart-count">0</span></div>
            </nav>
        </div>
    </header>

    <section class="hero" id="accueil">
        <h1>Bienvenue chez Double King Shop</h1>
        <p>Découvrez notre sélection de produits high-tech de qualité</p>
    </section>

    <div class="container">
        <h2 class="section-title" id="produits">Nos Produits</h2>
        <div class="products" id="products-list"></div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🛒 Votre Panier</h2>
                <span class="close-btn" onclick="toggleCart()">&times;</span>
            </div>
            <div id="cart-items"></div>
            <div class="cart-total">Total: <span id="cart-total">0</span> CDF</div>
            <div class="checkout-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="customer-phone" required>
                </div>
                <button class="checkout-btn" onclick="checkout()">✅ Commander</button>                <button class="checkout-btn pi-payment-btn" onclick="payWithPi()">💎 Payer avec Pi</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Traitement en cours...</p>
    </div>

    <script>
        // Produits
        const products = [
            { id: 1, name: "Smartphone Samsung Galaxy", price: 450000, image: "📱" },
            { id: 2, name: "Ordinateur Portable HP", price: 850000, image: "💻" },
            { id: 3, name: "Écouteurs Sans Fil", price: 75000, image: "🎧" },
            { id: 4, name: "Montre Connectée", price: 125000, image: "⌚" }
        ];

        let cart = [];
        const PI_PRICE = 5000; // 1 Pi = 5000 CDF (taux de conversion)

        // Initialisation Pi SDK
        Pi.init({ version: "2.0", sandbox: true });

        // Afficher les produits
        function renderProducts() {
            const container = document.getElementById('products-list');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.image}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} CDF</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">Ajouter au panier</button>
                    </div>
                </div>
            `).join('');
        }

        // Ajouter au panier
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
            showNotification('Produit ajouté au panier!');
        }

        // Mettre à jour le panier
        function updateCart() {
            const cartCount = document.getElementById('cart-count');
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            cartCount.textContent = totalItems;
            cartTotal.textContent = totalPrice.toLocaleString();
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; padding: 2rem; color: #999;">Votre panier est vide</p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} CDF</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Mettre à jour la quantité
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCart();
                }
            }        }

        // Retirer du panier
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
            showNotification('Produit retiré du panier');
        }

        // Afficher/masquer le panier
        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // Commander (paiement CDF)
        function checkout() {
            if (cart.length === 0) {
                showNotification('Votre panier est vide!', 'error');
                return;
            }
            
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            
            if (!name || !phone) {
                showNotification('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const order = {
                id: Date.now(),
                items: cart,
                total: total,
                customer: { name, phone },
                date: new Date().toISOString(),
                paymentMethod: 'CDF'
            };
            
            saveOrder(order);
            showNotification('Commande passée avec succès!');
            cart = [];
            updateCart();
            toggleCart();
        }

        // Payer avec Pi
        async function payWithPi() {
            if (cart.length === 0) {                showNotification('Votre panier est vide!', 'error');
                return;
            }
            
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            
            if (!name || !phone) {
                showNotification('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            const totalCDF = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const piAmount = (totalCDF / PI_PRICE).toFixed(2);
            
            try {
                document.getElementById('loading').style.display = 'flex';
                
                const paymentData = {
                    amount: parseFloat(piAmount),
                    memo: `Commande Double King Shop - ${cart.length} article(s)`,
                    metadata: { 
                        orderId: Date.now().toString(),
                        items: cart,
                        customerName: name,
                        customerPhone: phone,
                        totalCDF: totalCDF
                    }
                };
                
                const callbacks = {
                    onReadyForServerApproval: async (paymentId) => {
                        console.log('Prêt pour approbation:', paymentId);
                        await approvePayment(paymentId);
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        console.log('Prêt pour complétion:', paymentId, txid);
                        await completePayment(paymentId, txid, paymentData.metadata);
                    },
                    onCancel: (paymentId) => {
                        console.log('Paiement annulé:', paymentId);
                        showNotification('Paiement annulé', 'error');
                        document.getElementById('loading').style.display = 'none';
                    },
                    onError: (error, payment) => {
                        console.error('Erreur de paiement:', error);
                        showNotification('Erreur de paiement: ' + error.message, 'error');
                        document.getElementById('loading').style.display = 'none';
                    }
                };                
                await Pi.createPayment(paymentData, callbacks);
                
            } catch (error) {
                console.error('Erreur:', error);
                showNotification('Erreur: ' + error.message, 'error');
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Approuver le paiement (côté serveur simulé)
        async function approvePayment(paymentId) {
            try {
                // Dans un cas réel, appelez votre backend ici
                const response = await fetch(`https://api.minepi.com/v2/payments/${paymentId}/approve`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'ety8qg54aj1vv9nocodmjiydzfh5uy93xiokpuc0juwkyao4rdcqlcfab4i0akhy',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    console.log('Paiement approuvé:', paymentId);
                }
            } catch (error) {
                console.error('Erreur approbation:', error);
                throw error;
            }
        }

        // Compléter le paiement
        async function completePayment(paymentId, txid, metadata) {
            try {
                const order = {
                    id: metadata.orderId,
                    items: metadata.items,
                    total: metadata.totalCDF,
                    customer: { 
                        name: metadata.customerName, 
                        phone: metadata.customerPhone 
                    },
                    date: new Date().toISOString(),
                    paymentMethod: 'Pi',
                    paymentId: paymentId,
                    txid: txid
                };
                
                saveOrder(order);
                                // Dans un cas réel, appelez votre backend ici
                const response = await fetch(`https://api.minepi.com/v2/payments/${paymentId}/complete`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Key VOTRE_API_KEY',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ txid })
                });
                
                if (response.ok) {
                    showNotification('Paiement réussi! Merci pour votre commande.');
                    cart = [];
                    updateCart();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('cart-modal').style.display = 'none';
                }
            } catch (error) {
                console.error('Erreur complétion:', error);
                showNotification('Erreur de complétion', 'error');
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Sauvegarder la commande (localStorage)
        function saveOrder(order) {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
        }

        // Afficher notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.background = type === 'error' ? '#e74c3c' : '#2ecc71';
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Initialisation
        renderProducts();
        updateCart();

        // Fermer le modal en cliquant à l'extérieur
        window.onclick = function(event) {
            const modal = document.getElementById('cart-modal');
            if (event.target === modal) {                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
