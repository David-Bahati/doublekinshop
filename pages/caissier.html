<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <title>DKS - Espace Caissier</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h1>Espace Caissier 💰</h1>
        <p>Enregistrement d'une vente</p>
        <hr>

        <div class="vente-form">
            <label>Sélectionnez l'accessoire :</label>
            <select id="select-article" onchange="calculerTotal()" style="width:100%; padding:10px; margin:10px 0;">
                <option value="">-- Choisir un article --</option>
            </select>

            <label>Quantité :</label>
            <input type="number" id="quantite" value="1" min="1" oninput="calculerTotal()" style="width:100%; padding:10px; margin:10px 0;">

            <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin-top: 10px;">
                <strong>TOTAL À PAYER : <span id="total-prix">0</span> $</strong>
            </div>

            <button onclick="validerVente()" class="btn caissier" style="width:100%; margin-top:20px;">✅ Valider la vente</button>
        </div>
          <div id="ticket-reçu" style="display:none; margin-top:20px; padding:20px; border:2px dashed #333; background:#fff; font-family: 'Courier New', Courier, monospace; text-align:left;">
    <h3 style="text-align:center;">DOUBLE KING SHOP</h3>
    <p style="text-align:center;">Merci de votre confiance !</p>
    <hr>
    <p id="recu-date"></p>
    <p id="recu-article"></p>
    <p id="recu-total" style="font-weight:bold; font-size:1.2em;"></p>
    <hr>
    <button onclick="window.print()" style="width:100%; background:#333; color:white; padding:10px;">🖨️ Imprimer / PDF</button>
    <button onclick="location.reload()" style="width:100%; background:#ccc; margin-top:5px; padding:5px;">Nouvelle vente</button>
</div>menu

        <br>
        <button onclick="window.location.href='../index.html'">Se déconnecter</button>
    </div>

    <script src="../main.js"></script>
</body>
</html>
